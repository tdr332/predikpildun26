<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PredikBot — Piala Dunia 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#1faa59;--green-dark:#0d8a44;--green-pale:#eafaf0;--red:#e0383d;--gray-bg:#f0f2f0;--bubble-bot:#fff;--bubble-user:#d8f8df;--text:#1c1e21;--text-muted:#667781;--border:#ebedf0;--header:#1a2b21}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center}
.phone{width:100%;max-width:480px;height:100vh;max-height:900px;display:flex;flex-direction:column;background:var(--gray-bg);overflow:hidden;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5)}
.chat-header{background:var(--header);color:#fff;padding:.85rem 1rem;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:5}
.bot-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bot-info{flex:1}
.bot-name{font-size:14.5px;font-weight:700}
.bot-status{font-size:11px;color:#9fd8b5;display:flex;align-items:center;gap:4px;margin-top:1px}
.bot-status .dot{width:6px;height:6px;border-radius:50%;background:#3ddc6f;flex-shrink:0}
.clear-btn{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:4px}
.chat-body{flex:1;overflow-y:auto;padding:1rem .75rem;display:flex;flex-direction:column;gap:6px}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:99px}
.msg-row{display:flex;max-width:88%}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end}
.bubble{padding:.65rem .85rem;border-radius:10px;font-size:13.5px;line-height:1.55;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.07)}
.bot .bubble{background:var(--bubble-bot);border-top-left-radius:3px;color:var(--text)}
.user .bubble{background:var(--bubble-user);border-top-right-radius:3px;color:var(--text)}
.msg-time{display:block;font-size:10px;color:#8c9a92;text-align:right;margin-top:4px}
.match-block{margin-bottom:.85rem;padding-bottom:.7rem;border-bottom:1px dashed #dde3dc}
.match-block:last-child{margin-bottom:0;border-bottom:none;padding-bottom:0}
.match-title{font-weight:800;font-size:13px;margin-bottom:5px;color:#0d3b1f}
.match-line{display:flex;justify-content:space-between;gap:6px;font-size:12.5px;padding:1px 0}
.ml-key{color:var(--text-muted);font-weight:500}
.ml-val{font-weight:700}
.val-over{color:#0d8a44}.val-under{color:#c02b2f}
.val-yes{color:#0d8a44}.val-no{color:#c02b2f}
.val-m{color:#1f6fdb}
.daily-header{font-weight:800;font-size:13px;color:#0d3b1f;margin-bottom:.65rem}
.daily-footer{font-size:10.5px;color:#8c9a92;margin-top:.5rem;padding-top:.5rem;border-top:1px solid #eef1ec}
.typing-bubble{background:var(--bubble-bot);border-radius:10px;border-top-left-radius:3px;padding:.7rem 1rem;display:flex;gap:5px;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.07)}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#bbc4bc;animation:td 1.2s infinite ease-in-out}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
.quick-wrap{padding:.5rem .75rem;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;background:var(--gray-bg);border-top:1px solid var(--border)}
.quick-wrap::-webkit-scrollbar{display:none}
.quick-chip{flex-shrink:0;background:#fff;border:1px solid #d0d7ce;color:#1a3320;font-size:12px;font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif}
.quick-chip:hover{background:var(--green);color:#fff;border-color:var(--green)}
.input-bar{background:#fff;padding:.6rem .65rem;display:flex;gap:8px;align-items:center;flex-shrink:0;border-top:1px solid var(--border)}
.input-bar input{flex:1;background:var(--gray-bg);border:1.5px solid transparent;border-radius:22px;padding:10px 16px;font-size:13.5px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
.input-bar input:focus{border-color:var(--green)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.send-btn:active{transform:scale(.9)}
.footer-note{text-align:center;font-size:10px;color:#aab5a8;padding:.4rem .75rem;background:#fff;flex-shrink:0}
</style>
</head>
<body>
<div class="phone">
  <div class="chat-header">
    <div class="bot-avatar">⚽</div>
    <div class="bot-info">
      <div class="bot-name">PredikBot — Piala Dunia 2026</div>
      <div class="bot-status"><span class="dot"></span><span>online · siap kasih prediksi</span></div>
    </div>
    <button class="clear-btn" onclick="clearChat()" title="Hapus chat">🗑️</button>
  </div>

  <div class="chat-body" id="chatBody"></div>

  <div class="quick-wrap">
    <div class="quick-chip" onclick="sendQuick('predik hari ni')">🔮 predik hari ni</div>
    <div class="quick-chip" onclick="sendQuick('bantuan')">❓ bantuan</div>
  </div>

  <div class="input-bar">
    <input type="text" id="chatInput" placeholder="Ketik 'predik hari ni'..." onkeydown="if(event.key==='Enter')handleSend()">
    <button class="send-btn" onclick="handleSend()">➤</button>
  </div>
  <div class="footer-note">⚠️ Prediksi statistik — bukan jaminan menang. Main bijak &amp; bertanggung jawab.</div>
</div>

<script>
const TEAMS={
CAN:{flag:'🇨🇦',name:'Canada',conf:'CONCACAF'},
MEX:{flag:'🇲🇽',name:'Mexico',conf:'CONCACAF'},
USA:{flag:'🇺🇸',name:'United States',conf:'CONCACAF'},
PAN:{flag:'🇵🇦',name:'Panama',conf:'CONCACAF'},
HAI:{flag:'🇭🇹',name:'Haiti',conf:'CONCACAF'},
CUW:{flag:'🇨🇼',name:'Curaçao',conf:'CONCACAF'},
ARG:{flag:'🇦🇷',name:'Argentina',conf:'CONMEBOL'},
BRA:{flag:'🇧🇷',name:'Brazil',conf:'CONMEBOL'},
URU:{flag:'🇺🇾',name:'Uruguay',conf:'CONMEBOL'},
PAR:{flag:'🇵🇾',name:'Paraguay',conf:'CONMEBOL'},
COL:{flag:'🇨🇴',name:'Colombia',conf:'CONMEBOL'},
ECU:{flag:'🇪🇨',name:'Ecuador',conf:'CONMEBOL'},
ENG:{flag:'🏴',name:'England',conf:'UEFA'},
FRA:{flag:'🇫🇷',name:'France',conf:'UEFA'},
ESP:{flag:'🇪🇸',name:'Spain',conf:'UEFA'},
GER:{flag:'🇩🇪',name:'Germany',conf:'UEFA'},
POR:{flag:'🇵🇹',name:'Portugal',conf:'UEFA'},
NED:{flag:'🇳🇱',name:'Netherlands',conf:'UEFA'},
BEL:{flag:'🇧🇪',name:'Belgium',conf:'UEFA'},
CRO:{flag:'🇭🇷',name:'Croatia',conf:'UEFA'},
SUI:{flag:'🇨🇭',name:'Switzerland',conf:'UEFA'},
AUT:{flag:'🇦🇹',name:'Austria',conf:'UEFA'},
NOR:{flag:'🇳🇴',name:'Norway',conf:'UEFA'},
SCO:{flag:'🏴',name:'Scotland',conf:'UEFA'},
SWE:{flag:'🇸🇪',name:'Sweden',conf:'UEFA'},
TUR:{flag:'🇹🇷',name:'Türkiye',conf:'UEFA'},
CZE:{flag:'🇨🇿',name:'Czechia',conf:'UEFA'},
BIH:{flag:'🇧🇦',name:'Bosnia & Herzegovina',conf:'UEFA'},
JAP:{flag:'🇯🇵',name:'Japan',conf:'AFC'},
KOR:{flag:'🇰🇷',name:'South Korea',conf:'AFC'},
AUS:{flag:'🇦🇺',name:'Australia',conf:'AFC'},
IRN:{flag:'🇮🇷',name:'Iran',conf:'AFC'},
SAU:{flag:'🇸🇦',name:'Saudi Arabia',conf:'AFC'},
QAT:{flag:'🇶🇦',name:'Qatar',conf:'AFC'},
UZB:{flag:'🇺🇿',name:'Uzbekistan',conf:'AFC'},
JOR:{flag:'🇯🇴',name:'Jordan',conf:'AFC'},
IRQ:{flag:'🇮🇶',name:'Iraq',conf:'AFC'},
MAR:{flag:'🇲🇦',name:'Morocco',conf:'CAF'},
EGY:{flag:'🇪🇬',name:'Egypt',conf:'CAF'},
ALG:{flag:'🇩🇿',name:'Algeria',conf:'CAF'},
TUN:{flag:'🇹🇳',name:'Tunisia',conf:'CAF'},
SEN:{flag:'🇸🇳',name:'Senegal',conf:'CAF'},
GHA:{flag:'🇬🇭',name:'Ghana',conf:'CAF'},
RSA:{flag:'🇿🇦',name:'South Africa',conf:'CAF'},
CIV:{flag:'🇨🇮',name:"Côte d'Ivoire",conf:'CAF'},
CPV:{flag:'🇨🇻',name:'Cape Verde',conf:'CAF'},
COD:{flag:'🇨🇩',name:'DR Congo',conf:'CAF'},
NZL:{flag:'🇳🇿',name:'New Zealand',conf:'OFC'}
};

// ════ EDIT PREDIKSI DI SINI ════
const FIXED_PREDICTIONS=[
  { ka:'BIH', kb:'QAT', main:'M1', dc:'X1', hc:'-1 BOSNIA', ou15:'Over',  ou25:'Over',  btts:'Ya' },
  { ka:'SUI', kb:'CAN', main:'M1', dc:'X1', ou15:'Over',  ou25:'Over',  btts:'Ya' },
  { ka:'MAR', kb:'HAI', main:'M1', dc:'X1', ou15:'Over',  ou45:'Under', btts:'Tidak' },
  { ka:'SCO', kb:'BRA', main:'M2', dc:'X2', ou15:'Over',  ou225:'Over', btts:'Tidak' },
  { ka:'CZE', kb:'MEX', main:'M2', dc:'X2', hc:'+1 CEKO', ou15:'Over',  ou2:'Over', btts:'Ya' },
  { ka:'RSA', kb:'KOR', main:'M2', dc:'X2', hc:'+1.5 AFRICA', ou15:'Over',  ou2:'Over', btts:'Ya' },
];

function buildFixedBlock(f){
  const a=TEAMS[f.ka],b=TEAMS[f.kb];
  const rows=[
    ['1X2',f.main,'val-m'],
    ['DC',f.dc,'val-m'],
  ];
  if(f.hc)    rows.push(['HANDICAP',f.hc,'val-m']);
  if(f.ou15)  rows.push(['OVER / UNDER = 1.5', f.ou15,  f.ou15==='Over'?'val-over':'val-under']);
  if(f.ou175) rows.push(['OVER / UNDER = 1.75',f.ou175, f.ou175==='Over'?'val-over':'val-under']);
  if(f.ou2)   rows.push(['OVER / UNDER = 2',   f.ou2,   f.ou2==='Over'?'val-over':'val-under']);
  if(f.ou225) rows.push(['OVER / UNDER = 2.25',f.ou225, f.ou225==='Over'?'val-over':'val-under']);
  if(f.ou25)  rows.push(['OVER / UNDER = 2.5', f.ou25,  f.ou25==='Over'?'val-over':'val-under']);
  if(f.ou275) rows.push(['OVER / UNDER = 2.75',f.ou275, f.ou275==='Over'?'val-over':'val-under']);
  if(f.ou3)   rows.push(['OVER / UNDER = 3',   f.ou3,   f.ou3==='Over'?'val-over':'val-under']);
  if(f.ou35)  rows.push(['OVER / UNDER = 3.5', f.ou35,  f.ou35==='Over'?'val-over':'val-under']);
  if(f.ou4)   rows.push(['OVER / UNDER = 4',   f.ou4,   f.ou4==='Over'?'val-over':'val-under']);
  if(f.ou45)  rows.push(['OVER / UNDER = 4.5', f.ou45,  f.ou45==='Over'?'val-over':'val-under']);
  if(f.ou5)   rows.push(['OVER / UNDER = 5',   f.ou5,   f.ou5==='Over'?'val-over':'val-under']);
  rows.push(['BTTS',f.btts,f.btts==='Ya'?'val-yes':'val-no']);
  if(f.corner) rows.push(['CORNER',f.corner,f.corner.toLowerCase().includes('over')?'val-over':'val-under']);
  return{title:`${a.flag} ${a.name.toUpperCase()} VS ${b.name.toUpperCase()} ${b.flag}`,rows};
}

function renderDailyHTML(){
  const d=new Date();
  const tgl=d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  let html=`<div class="daily-header">📅 PREDIKSI HARI INI — ${tgl}</div>`;
  FIXED_PREDICTIONS.forEach(f=>{
    const m=buildFixedBlock(f);
    html+=`<div class="match-block"><div class="match-title">${m.title}</div>
    ${m.rows.map(r=>`<div class="match-line"><span class="ml-key">${r[0]} =</span><span class="ml-val ${r[2]}">${r[1]}</span></div>`).join('')}</div>`;
  });
  html+=`<div class="daily-footer">⚠️ Prediksi statistik, bukan jaminan menang. Cek odds sebelum pasang.</div>`;
  return html;
}

// ════ CHAT UI ════
const chatBody=document.getElementById('chatBody');
function nowTime(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}

function addUserMsg(text){
  const row=document.createElement('div');
  row.className='msg-row user';
  row.innerHTML=`<div class="bubble">${text.replace(/</g,'&lt;')}<span class="msg-time">${nowTime()}</span></div>`;
  chatBody.appendChild(row);
  scrollDown();
}

function addBotHTML(html){
  const row=document.createElement('div');
  row.className='msg-row bot';
  row.innerHTML=`<div class="bubble">${html}<span class="msg-time">${nowTime()}</span></div>`;
  chatBody.appendChild(row);
  scrollDown();
}

function showTyping(){
  const row=document.createElement('div');
  row.className='msg-row bot';
  row.id='typingRow';
  row.innerHTML=`<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatBody.appendChild(row);
  scrollDown();
}

function hideTyping(){
  const t=document.getElementById('typingRow');
  if(t)t.remove();
}

function scrollDown(){setTimeout(()=>{chatBody.scrollTop=chatBody.scrollHeight},50)}

function delay(ms){return new Promise(r=>setTimeout(r,ms))}

function handleSend(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  addUserMsg(text);
  processMessage(text);
}

function sendQuick(text){
  addUserMsg(text);
  processMessage(text);
}

async function processMessage(text){
  const t=text.toLowerCase().trim();

  if(t.includes('predik')||(t.includes('hari')&&t.includes('ni'))||t.includes('hari ini')){
    showTyping();
    await delay(800);
    hideTyping();
    addBotHTML(renderDailyHTML());
    return;
  }

  if(t==='bantuan'||t==='help'||t==='?'||t==='halo'||t==='hai'||t==='hi'||t==='hello'){
    showTyping();
    await delay(600);
    hideTyping();
    addBotHTML(`👋 Halo! Saya <b>PredikBot</b> ⚽<br><br>
    🔮 Ketik <b>predik hari ni</b> → langsung keluar prediksi semua pertandingan hari ini<br><br>
    Prediksi sudah lengkap dengan:<br>
    • 1X2 · DC · Handicap<br>
    • Over/Under · BTTS · Corner`);
    return;
  }

  showTyping();
  await delay(600);
  hideTyping();
  addBotHTML(`Ketik <b>predik hari ni</b> untuk lihat prediksi pertandingan hari ini 🔮`);
}

function clearChat(){
  chatBody.innerHTML='';
  initChat();
}

function initChat(){
  addBotHTML(`👋 Halo! Saya <b>PredikBot</b> ⚽<br><br>
  Ketik <b>predik hari ni</b> untuk lihat prediksi pertandingan hari ini — lengkap dengan 1X2, DC, Handicap, Over/Under, dan BTTS!`);
}

initChat();
</script>
</body>
</html>
